                    { name: "AES-GCM", iv: iv },
                    key,
                    data
                );

                return dec.decode(decryptedBuffer);
            } catch (e) {
                throw new Error("Decryption failed");
            }
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let password = urlParams.get('page');
            let isFromStorage = false;

            // Check if user previously agreed to keep it unlocked on this device
            if (!password) {
                password = localStorage.getItem('staticrypt_pwd_' + saltHex);
                if (password) {
                    isFromStorage = true;
                }
            }

            if (password) {
                try {
                    const decryptedHtml = await decryptContent(password);
                    document.open();
                    document.write(decryptedHtml);
                    
                    // Security enhancement: Remove password from visible URL bar
                    if (window.history.replaceState) {
                        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                        window.history.replaceState({path: cleanUrl}, '', cleanUrl);
                    }
                    
                    document.close();

                    // --- 1. Inject PWA Manifest to trigger Install Prompt ---
                    try {
                        const manifestData = {
                            name: "Unlocked Secure File",
                            short_name: "Unlocked",
                            display: "standalone",
                            start_url: window.location.href.split('?')[0],
                            icons: [{
                                src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🔓</text></svg>",
                                sizes: "192x192",
                                type: "image/svg+xml"
                            }, {
                                src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🔓</text></svg>",
                                sizes: "512x512",
                                type: "image/svg+xml"
                            }]
                        };
                        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
                        const link = document.createElement('link');
                        link.rel = 'manifest';
                        link.href = URL.createObjectURL(manifestBlob);
                        document.head.appendChild(link);

                        if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
                            const swBlob = new Blob(["self.addEventListener('fetch', (e) => {});"], {type: 'application/javascript'});
                            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
                        }
                    } catch(e) {}

                    // Catch native install prompt event
                    window.deferredPrompt = null;
                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        window.deferredPrompt = e;
                        const btn = document.getElementById('staticrypt-btn-save');
                        if (btn) btn.innerText = 'Install App & Keep Unlocked';
                    });

                    // --- 2. Refresh Favicon Fix ---
                    setTimeout(() => {
                        let hasIcon = false;
                        const icons = document.querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]');
                        icons.forEach(icon => {
                            hasIcon = true;
                            const href = icon.href;
                            icon.remove();
                            const newIcon = document.createElement('link');
                            newIcon.rel = icon.rel;
                            newIcon.href = href;
                            document.head.appendChild(newIcon);
                        });
                        
                        // If original file had no icon, force an inline unlocked padlock SVG icon
                        if (!hasIcon) {
                            const defaultIcon = document.createElement('link');
                            defaultIcon.rel = 'icon';
                            defaultIcon.href = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔓</text></svg>";
                            document.head.appendChild(defaultIcon);
                        }
                    }, 100);

                    // --- 3. Inject Save Popup (If not already loaded from storage) ---
                    if (!isFromStorage) {
                        setTimeout(() => {
                            const modalHtml = '<div id="staticrypt-install-modal" style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); display: flex; align-items: center; justify-content: center; z-index: 2147483647; font-family: system-ui, -apple-system, sans-serif; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease;">' +
                                '<div style="background: white; padding: 24px; border-radius: 16px; max-width: 320px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); transform: translateY(20px); transition: transform 0.3s ease;" id="staticrypt-modal-content">' +
                                    '<h2 style="margin: 0 0 12px 0; color: #0f172a; font-size: 1.25rem; font-weight: 700;">Keep this unlocked?</h2>' +
                                    '<p style="margin: 0 0 24px 0; color: #475569; font-size: 0.875rem; line-height: 1.5;">Would you like to save this file to this device? You won\'t need to use the link with the password next time you open this file here.</p>' +
                                    '<div style="display: flex; flex-direction: column; gap: 8px;">' +
                                        '<button id="staticrypt-btn-save" style="background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;">Yes, keep me unlocked</button>' +
                                        '<button id="staticrypt-btn-close" style="background: #f1f5f9; color: #475569; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;">No, ask next time</button>' +
                                    '</div>' +
                                '</div>' +
                            '</div>';
                            
                            const div = document.createElement('div');
                            div.innerHTML = modalHtml;
                            document.body.appendChild(div);

                            // Trigger fade-in animation
                            setTimeout(() => {
                                const modal = document.getElementById('staticrypt-install-modal');
                                const content = document.getElementById('staticrypt-modal-content');
                                if(modal && content) {
                                    modal.style.opacity = '1';
                                    content.style.transform = 'translateY(0)';
                                }
                            }, 10);

                            const closePopup = () => {
                                document.getElementById('staticrypt-install-modal').style.opacity = '0';
                                setTimeout(() => div.remove(), 300);
                            };

                            document.getElementById('staticrypt-btn-save').onclick = () => {
                                localStorage.setItem('staticrypt_pwd_' + saltHex, password);
                                
                                // Check if we can do a native PWA Install prompt
                                if (window.deferredPrompt) {
                                    window.deferredPrompt.prompt();
                                    window.deferredPrompt.userChoice.then(() => {
                                        window.deferredPrompt = null;
                                        closePopup();
                                    });
                                } else {
                                    // Fallback for file:// or un-installable environments
                                    alert("Saved! You can now use your browser\'s \'Add to Home Screen\' or \'Bookmark\' option manually. (Auto-install prompts require HTTPS hosting).");
                                    closePopup();
                                }
                            };
                            
                            document.getElementById('staticrypt-btn-close').onclick = closePopup;
                        }, 500); // Small delay allows the decrypted file to fully render first
                    }

                } catch (err) {
                    console.error("Authentication failed or corrupted data.", err);
                    // If a saved password fails (e.g., file was re-encrypted), clear it
                    if (isFromStorage) {
                        localStorage.removeItem('staticrypt_pwd_' + saltHex);
                    }
                }
            }
        };
    </script>
</body>
</html>
